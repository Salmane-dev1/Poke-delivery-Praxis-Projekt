jenkins:
  systemMessage: "PokéDelivery Jenkins configured automatically with Configuration as Code and role-based access control"

  numExecutors: 0

  mode: NORMAL

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER}"
          name: "Salmane El Aouni"
          password: "${JENKINS_ADMIN_PASSWORD}"

        - id: "${JENKINS_MANAGER_USER}"
          name: "PokéDelivery Manager"
          password: "${JENKINS_MANAGER_PASSWORD}"

        - id: "${JENKINS_DEVELOPER_USER}"
          name: "PokéDelivery Developer"
          password: "${JENKINS_DEVELOPER_PASSWORD}"

  authorizationStrategy:
    globalMatrix:
      permissions:
        # Admin user has full Jenkins administration access
        - "Overall/Administer:${JENKINS_ADMIN_USER}"

        # Developer user has full Jenkins administration access
        - "Overall/Administer:${JENKINS_DEVELOPER_USER}"

        # Manager user has read-only access
        - "Overall/Read:${JENKINS_MANAGER_USER}"
        - "Job/Read:${JENKINS_MANAGER_USER}"
        - "View/Read:${JENKINS_MANAGER_USER}"
        - "Agent/ExtendedRead:${JENKINS_MANAGER_USER}"

  nodes:
    - permanent:
        name: "agent1"
        remoteFS: "/home/jenkins/agent"
        labelString: "agent1"
        mode: NORMAL
        launcher:
          inbound:
            workDirSettings:
              disabled: false
              internalDir: "remoting"
              failIfWorkDirIsMissing: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "azure-sp"
              description: "Azure Service Principal for PokéDelivery deployment"
              username: "${AZ_CLIENT_ID}"
              password: "${AZ_CLIENT_SECRET}"

unclassified:
  location:
    url: "http://localhost:8080/"

jobs:
  - file: /var/jenkins_home/job-dsl/pokedelivery-cd.groovy
