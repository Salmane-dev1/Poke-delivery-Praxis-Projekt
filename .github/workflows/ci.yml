name: PokéDelivery CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
 name: PokéDelivery CI

on:
  pull_request:
    branches: [ "main", "develop" ]
  push:
    branches: [ "main", "develop" ]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      pokedelivery-api:
        build:
          context: .
          dockerfile: api/Dockerfile
        ports:
          - 7071:7071
        healthcheck:
          test: ["CMD-SHELL", "wget -qO- http://localhost:7071/api/pokemon/pikachu || exit 1"]
          interval: 10s
          timeout: 5s
          retries: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bruno CLI
        run: npm install -g @usebruno/cli

      - name: Run Bruno API tests
        env:
          BASE_URL: http://localhost:7071/api
        run: |
          cd bruno
          bru run .
